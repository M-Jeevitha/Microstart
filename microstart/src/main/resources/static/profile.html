<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Profile Management | MicroStart</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            transition: .3s;
        }
        .input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        .input:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .primary-action {
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .primary-action:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6); }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="brand-wrap">
            <div class="brand-mark">M</div>
            <div><h2>MicroStart</h2><span>Fintech Suite</span></div>
        </div>

        <nav class="side-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="funding.html">Funding</a>
            <a href="tracking.html">Tracking</a>
            <a href="budget.html">Budgeting</a>
            <a href="education.html">Education</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="admin.html" id="adminLink" style="display:none;">Admin Central</a>
        </nav>

        <div class="side-bottom">
            <a href="login.html" class="logout-btn">Logout</a>
        </div>
    </aside>

    <main class="main">

        <header class="top-header">
            <div>
                <h1>Profile Management</h1>
                <p>View and update your personal and financial details.</p>
            </div>
        </header>

        <section class="grid-two">
            
            <div class="panel">
                <div class="panel-head">
                    <h3>Personal Information</h3>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <div class="profile-avatar" id="profileAvatar">U</div>
                    <button class="action-sm" style="margin-bottom: 20px;">Change Avatar</button>
                </div>
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">Full Name</label>
                <input type="text" id="profName" class="input" value="User">
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">Email Address (Cannot change)</label>
                <input type="email" id="profEmail" class="input" value="user@example.com" disabled>
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">Phone Number</label>
                <input type="text" id="profPhone" class="input" placeholder="+91 XXXXX XXXXX">
                
                <button class="primary-action" onclick="updateProfile()">Save Changes</button>
                <div id="profMsg" style="margin-top:15px;"></div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h3>Financial & KYC Details</h3>
                </div>
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">PAN Card Number</label>
                <input type="text" id="profPan" class="input" placeholder="ABCDE1234F">
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">Aadhar Number</label>
                <input type="text" id="profAadhar" class="input" placeholder="1234 5678 9012">
                
                <label style="color: var(--muted); font-size: 13px; margin-bottom: 5px; display: block;">Annual Income (₹)</label>
                <select id="profIncome" class="input">
                    <option value="">Select Range</option>
                    <option value="1">Below ₹2,50,000</option>
                    <option value="2">₹2,50,000 - ₹5,00,000</option>
                    <option value="3">₹5,00,000 - ₹10,00,000</option>
                    <option value="4">Above ₹10,00,000</option>
                </select>
                
                <button class="primary-action" onclick="updateKYC()" style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">Submit KYC</button>
                <div id="kycMsg" style="margin-top:15px;"></div>
            </div>

        </section>

    </main>
</div>

<div class="toast" id="toast">Profile Updated</div>

<script src="js/profile.js"></script>
</body>
</html>
