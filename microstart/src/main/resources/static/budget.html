<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Budgeting | MicroStart</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="brand-wrap">
            <div class="brand-mark">M</div>
            <div><h2>MicroStart</h2><span>Fintech Suite</span></div>
        </div>

        <nav class="side-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="funding.html">Funding</a>
            <a href="tracking.html">Tracking</a>
            <a href="budget.html" class="active">Budgeting</a>
            <a href="education.html">Education</a>
            <a href="profile.html">Profile</a>
            <a href="admin.html">Admin Central</a>
        </nav>

        <a href="login.html" class="logout-btn">Logout</a>
    </aside>

    <main class="main">

        <header class="top-header">
            <div>
                <h1>Expense Tracker & Budgeting</h1>
                <p>Track your income and expenses intelligently.</p>
            </div>
        </header>

        <section class="stats-grid" id="budgetSummary">
            <div class="stat-card">
                <span>Total Income</span>
                <h2 id="totalIncome">₹0</h2>
            </div>
            <div class="stat-card">
                <span>Total Expense</span>
                <h2 id="totalExpense">₹0</h2>
            </div>
            <div class="stat-card">
                <span>Net Savings</span>
                <h2 id="netSavings" class="green">₹0</h2>
            </div>
        </section>

        <section class="grid-two" style="margin-top: 20px;">
            <div class="panel">
                <div class="panel-head">
                    <h3>Add Transaction</h3>
                </div>
                
                <select id="txnType" class="input">
                    <option value="INCOME">Income</option>
                    <option value="EXPENSE" selected>Expense</option>
                </select>
                
                <input id="txnCategory" class="input" placeholder="Category (e.g. Rent, Food, Salary)">
                <input id="txnAmount" type="number" class="input" placeholder="Amount (₹)">
                <input id="txnDesc" class="input" placeholder="Description (Optional)">

                <button class="primary-action" onclick="addTransaction()">Add Transaction</button>
                <div id="txnMsg" style="margin-top:10px;"></div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h3>Recent Transactions</h3>
                </div>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table class="admin-table" id="txnTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="txnTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/budget.js"></script>
</body>
</html>
