<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Reset Password | MicroStart</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-layout">
    
    <!-- Left branding -->
    <div class="auth-brand">
        <div class="overlay"></div>
        
        <div class="brand-content">
            <a href="index.html" class="brand-link">← Back to website</a>
            
            <h1>Create New Password</h1>
            <p>Please enter your new password to regain access to your account.</p>
            
            <div class="trust-grid">
                <div class="trust-card">
                    <h3>Secure Process</h3>
                    <p>Your data is protected with industry-standard encryption.</p>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Right Form -->
    <div class="auth-panel">
        
        <div class="auth-card">
            
            <div class="logo-mark">M</div>
            
            <h2>Reset Password</h2>
            <p class="sub">Enter your new secure password</p>
            
            <label>New Password</label>
            <div class="password-wrap">
                <input type="password" id="password" placeholder="Enter new password">
                <button type="button" class="eye" onclick="togglePassword('password',this)">👁</button>
            </div>
            
            <div id="msg" class="msg"></div>
            
            <button onclick="resetPassword()" class="primary-btn">Update Password</button>
            
        </div>
        
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
