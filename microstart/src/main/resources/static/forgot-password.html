<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Forgot Password | MicroStart</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-layout">
    
    <!-- Left branding -->
    <div class="auth-brand">
        <div class="overlay"></div>
        
        <div class="brand-content">
            <a href="index.html" class="brand-link">← Back to website</a>
            
            <h1>Reset Your Password</h1>
            <p>Don't worry, it happens to the best of us. We'll send you a recovery link.</p>
            
            <div class="trust-grid">
                <div class="trust-card">
                    <h3>Secure Process</h3>
                    <p>Your data is protected with industry-standard encryption.</p>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Right Form -->
    <div class="auth-panel">
        
        <div class="auth-card">
            
            <div class="logo-mark">M</div>
            
            <h2>Forgot Password</h2>
            <p class="sub">Enter your email to receive a reset link</p>
            
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@domain.com">
            
            <div id="msg" class="msg"></div>
            
            <button onclick="forgotPassword()" class="primary-btn">Send Reset Link</button>
            
            <div class="divider">OR</div>
            
            <a href="login.html" class="ghost-btn">Return to Login</a>
            
        </div>
        
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
